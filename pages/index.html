<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼图验证码 Demo · PuzzleVcode</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f0f2f5;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    /* ── 拼图组件全局样式 ── */
    @keyframes pvDotLoad {
      0% {
        opacity: 1;
        transform: scale(1.3);
      }

      100% {
        opacity: 0.2;
        transform: scale(0.3);
      }
    }

    .pv-reset {
      transition: transform 200ms !important;
      transform: rotate(0deg);
    }

    .pv-reset:hover {
      transform: rotate(-90deg) !important;
    }

    .pv-range-btn>div {
      width: 0;
      height: 40%;
      border: solid 1.5px #6aa0ff;
      transition: all 200ms;
    }

    .pv-range-btn>div:nth-child(2) {
      margin: 0 4px;
    }

    .pv-range-btn:hover>div:nth-child(1),
    .pv-range-btn.isDown>div:nth-child(1) {
      border: solid 4px transparent !important;
      height: 0 !important;
      border-right-color: #6aa0ff !important;
    }

    .pv-range-btn:hover>div:nth-child(2),
    .pv-range-btn.isDown>div:nth-child(2) {
      border-width: 3px !important;
      height: 0 !important;
      border-radius: 3px !important;
      margin: 0 6px !important;
      border-right-color: #6aa0ff !important;
    }

    .pv-range-btn:hover>div:nth-child(3),
    .pv-range-btn.isDown>div:nth-child(3) {
      border: solid 4px transparent !important;
      height: 0 !important;
      border-left-color: #6aa0ff !important;
    }

    /* ── Demo 页面动画 ── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out
    }

    @keyframes octocat-wave {

      0%,
      100% {
        transform: rotate(0)
      }

      20%,
      60% {
        transform: rotate(-25deg)
      }

      40%,
      80% {
        transform: rotate(10deg)
      }
    }

    @media (max-width:500px) {
      .github-corner:hover .octo-arm {
        animation: none
      }

      .github-corner .octo-arm {
        animation: octocat-wave 560ms ease-in-out
      }
    }

    /* ── 响应式 ── */
    @media (max-width: 480px) {
      .demo-card {
        padding: 28px 20px !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ═══════════════════════════════════════════════════════════════
       PuzzleVcode 组件
    ═══════════════════════════════════════════════════════════════ */
    const ResetIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
        <path d="M4 12a8 8 0 1 1 1.93 5.172" stroke="rgba(255,255,255,0.9)" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round" />
        <path d="M4 18v-4h4" stroke="rgba(255,255,255,0.9)" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );

    const LoadingDots = () => (
      <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
        {[0, 0.13, 0.26, 0.39, 0.52].map((delay, i) => (
          <span key={i} style={{
            display: "inline-block", width: 6, height: 6,
            borderRadius: "50%", backgroundColor: "#999",
            animation: `pvDotLoad 1.04s ease ${delay}s infinite`,
          }} />
        ))}
      </div>
    );

    const PuzzleVcode = ({
      show = false, canvasWidth = 310, canvasHeight = 160,
      puzzleScale = 1, sliderSize = 50, range = 10,
      imgs = null,
      successText = "验证通过！", failText = "验证失败，请重试",
      sliderText = "拖动滑块完成拼图",
      onSuccess, onFail, onClose,
    }) => {
      const c1 = useRef(null), c2 = useRef(null), c3 = useRef(null);
      const [loading, setLoading] = useState(false);
      const [isSuccess, setIsSuccess] = useState(false);
      const [infoShow, setInfoShow] = useState(false);
      const [infoFail, setInfoFail] = useState(false);
      const [infoText, setInfoText] = useState("");
      const [mouseDown, setMouseDown] = useState(false);
      const [styleWidth, setStyleWidth] = useState(50);

      const R = useRef({});
      const sliderBaseSize = Math.max(Math.min(Math.round(sliderSize), Math.round(canvasWidth * 0.5)), 10);
      const puzzleBaseSize = Math.round(Math.max(Math.min(puzzleScale, 2), 0.2) * 52.5 + 6);

      R.current.canvasWidth = canvasWidth;
      R.current.canvasHeight = canvasHeight;
      R.current.puzzleScale = puzzleScale;
      R.current.sliderBaseSize = sliderBaseSize;
      R.current.puzzleBaseSize = puzzleBaseSize;
      R.current.range = range;
      R.current.imgs = imgs;
      R.current.successText = successText;
      R.current.failText = failText;
      R.current.onSuccess = onSuccess;
      R.current.onFail = onFail;
      R.current.onClose = onClose;

      if (R.current.initialized == null) {
        R.current.initialized = true;
        R.current.isCanSlide = false;
        R.current.isSubmiting = false;
        R.current.mouseDown = false;
        R.current.startWidth = sliderBaseSize;
        R.current.startX = 0;
        R.current.newX = 0;
        R.current.pinX = 0;
        R.current.pinY = 0;
        R.current.imgIndex = -1;
        R.current.timer = null;
        R.current._closeDown = false;
      }

      const puzzleOffset = useMemo(() => {
        const sbs = sliderBaseSize, pbs = puzzleBaseSize, cw = canvasWidth;
        return styleWidth - sbs - (pbs - sbs) * ((styleWidth - sbs) / (cw - sbs));
      }, [styleWidth, sliderBaseSize, puzzleBaseSize, canvasWidth]);

      const getRandom = (min, max) => Math.ceil(Math.random() * (max - min) + min);

      const paintBrick = (ctx, pX, pY) => {
        const m = Math.ceil(15 * R.current.puzzleScale);
        ctx.beginPath();
        ctx.moveTo(pX, pY);
        ctx.lineTo(pX + m, pY);
        ctx.arcTo(pX + m, pY - m / 2, pX + m + m / 2, pY - m / 2, m / 2);
        ctx.arcTo(pX + 2 * m, pY - m / 2, pX + 2 * m, pY, m / 2);
        ctx.lineTo(pX + 3 * m, pY);
        ctx.lineTo(pX + 3 * m, pY + m);
        ctx.arcTo(pX + 3 * m + m / 2, pY + m, pX + 3 * m + m / 2, pY + m + m / 2, m / 2);
        ctx.arcTo(pX + 3 * m + m / 2, pY + 2 * m, pX + 3 * m, pY + 2 * m, m / 2);
        ctx.lineTo(pX + 3 * m, pY + 3 * m);
        ctx.lineTo(pX, pY + 3 * m);
        ctx.lineTo(pX, pY + 2 * m);
        ctx.arcTo(pX + m / 2, pY + 2 * m, pX + m / 2, pY + m + m / 2, m / 2);
        ctx.arcTo(pX + m / 2, pY + m, pX, pY + m, m / 2);
        ctx.lineTo(pX, pY);
      };

      const makeImgWithCanvas = () => {
        const { canvasWidth: cw, canvasHeight: ch } = R.current;
        const cv = document.createElement("canvas");
        cv.width = cw; cv.height = ch;
        const ctx = cv.getContext("2d");
        ctx.fillStyle = `rgb(${getRandom(100, 255)},${getRandom(100, 255)},${getRandom(100, 255)})`;
        ctx.fillRect(0, 0, cw, ch);
        for (let i = 0; i < 12; i++) {
          ctx.fillStyle = `rgb(${getRandom(100, 255)},${getRandom(100, 255)},${getRandom(100, 255)})`;
          ctx.strokeStyle = `rgb(${getRandom(100, 255)},${getRandom(100, 255)},${getRandom(100, 255)})`;
          if (getRandom(0, 2) > 1) {
            ctx.save();
            ctx.rotate((getRandom(-90, 90) * Math.PI) / 180);
            ctx.fillRect(getRandom(-20, cw - 20), getRandom(-20, ch - 20), getRandom(10, cw / 2 + 10), getRandom(10, ch / 2 + 10));
            ctx.restore();
          } else {
            ctx.beginPath();
            const ran = getRandom(-Math.PI, Math.PI);
            ctx.arc(getRandom(0, cw), getRandom(0, ch), getRandom(10, ch / 2 + 10), ran, ran + Math.PI * 1.5);
            ctx.closePath(); ctx.fill();
          }
        }
        return cv.toDataURL("image/png");
      };

      const makeImgSize = (img) => {
        const { canvasWidth: cw, canvasHeight: ch } = R.current;
        const imgScale = img.width / img.height, canvasScale = cw / ch;
        let x = 0, y = 0, w = 0, h = 0;
        if (imgScale > canvasScale) { h = ch; w = imgScale * h; y = 0; x = (cw - w) / 2; }
        else { w = cw; h = w / imgScale; x = 0; y = (ch - h) / 2; }
        return [x, y, w, h];
      };

      const resetState = () => {
        const sbs = R.current.sliderBaseSize;
        R.current.isCanSlide = false; R.current.mouseDown = false;
        R.current.startWidth = sbs; R.current.startX = 0; R.current.newX = 0;
        setMouseDown(false); setStyleWidth(sbs);
        setIsSuccess(false); setInfoShow(false); setInfoFail(false);
      };

      const init = (withCanvas = false) => {
        const { canvasWidth: cw, canvasHeight: ch, puzzleBaseSize: pbs, imgs: imgList } = R.current;
        setLoading(true); R.current.isCanSlide = false;
        const canvas1 = c1.current, canvas2 = c2.current, canvas3 = c3.current;
        if (!canvas1 || !canvas2 || !canvas3) { setLoading(false); return; }
        const ctx = canvas1.getContext("2d"), ctx2 = canvas2.getContext("2d"), ctx3 = canvas3.getContext("2d");
        const isFF = navigator.userAgent.includes("Firefox") && navigator.userAgent.includes("Windows");
        ctx.fillStyle = "rgba(255,255,255,1)"; ctx3.fillStyle = "rgba(255,255,255,1)";
        ctx.clearRect(0, 0, cw, ch); ctx2.clearRect(0, 0, cw, ch);
        const pX = getRandom(pbs, cw - pbs - 20), pY = getRandom(20, ch - pbs - 20);
        R.current.pinX = pX; R.current.pinY = pY;
        const img = document.createElement("img"); img.crossOrigin = "anonymous";
        img.onload = () => {
          const [x, y, w, h] = makeImgSize(img);
          ctx.save(); paintBrick(ctx, pX, pY); ctx.closePath();
          if (!isFF) {
            ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowColor = "#000"; ctx.shadowBlur = 3;
            ctx.fill(); ctx.clip();
          } else {
            ctx.clip(); ctx.save();
            ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowColor = "#000"; ctx.shadowBlur = 3;
            ctx.fill(); ctx.restore();
          }
          ctx.drawImage(img, x, y, w, h);
          ctx3.fillRect(0, 0, cw, ch); ctx3.drawImage(img, x, y, w, h);
          ctx.globalCompositeOperation = "source-atop";
          paintBrick(ctx, pX, pY);
          ctx.arc(pX + Math.ceil(pbs / 2), pY + Math.ceil(pbs / 2), pbs * 1.2, 0, Math.PI * 2, true);
          ctx.closePath();
          ctx.shadowColor = "rgba(255,255,255,.8)"; ctx.shadowOffsetX = -1; ctx.shadowOffsetY = -1;
          ctx.shadowBlur = Math.min(Math.ceil(8 * R.current.puzzleScale), 12);
          ctx.fillStyle = "#ffffaa"; ctx.fill();
          const imgData = ctx.getImageData(pX - 3, pY - 20, pX + pbs + 5, pY + pbs + 5);
          ctx2.putImageData(imgData, 0, pY - 20);
          ctx.restore(); ctx.clearRect(0, 0, cw, ch);
          ctx.save(); paintBrick(ctx, pX, pY); ctx.globalAlpha = 0.8; ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.restore();
          ctx.save(); ctx.globalCompositeOperation = "source-atop";
          paintBrick(ctx, pX, pY);
          ctx.arc(pX + Math.ceil(pbs / 2), pY + Math.ceil(pbs / 2), pbs * 1.2, 0, Math.PI * 2, true);
          ctx.shadowColor = "#000"; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2; ctx.shadowBlur = 16; ctx.fill(); ctx.restore();
          ctx.save(); ctx.globalCompositeOperation = "destination-over"; ctx.drawImage(img, x, y, w, h); ctx.restore();
          setLoading(false); R.current.isCanSlide = true;
        };
        img.onerror = () => init(true);
        if (!withCanvas && imgList && imgList.length) {
          let rn = getRandom(0, imgList.length - 1);
          if (rn === R.current.imgIndex) rn = rn === imgList.length - 1 ? 0 : rn + 1;
          R.current.imgIndex = rn; img.src = imgList[rn];
        } else { img.src = makeImgWithCanvas(); }
      };

      const reset = () => { if (R.current.isSubmiting) return; resetState(); init(); };

      const submit = () => {
        const { sliderBaseSize: sbs, puzzleBaseSize: pbs, canvasWidth: cw, range: rng,
          successText: st, failText: ft, pinX: pX, startWidth: sw, startX: sx, newX: nx } = R.current;
        const rawW = sw + nx - sx;
        const clampedSw = rawW < sbs ? sbs : rawW > cw ? cw : rawW;
        const deviation = Math.abs(pX - (clampedSw - sbs) + (pbs - sbs) * ((clampedSw - sbs) / (cw - sbs)) - 3);
        R.current.isSubmiting = true; R.current.isCanSlide = false;
        if (deviation < rng) {
          setInfoText(st); setInfoFail(false); setInfoShow(true); setIsSuccess(true);
          clearTimeout(R.current.timer);
          R.current.timer = setTimeout(() => { R.current.isSubmiting = false; R.current.onSuccess && R.current.onSuccess(deviation); }, 800);
        } else {
          setInfoText(ft); setInfoFail(true); setInfoShow(true);
          R.current.onFail && R.current.onFail(deviation);
          clearTimeout(R.current.timer);
          R.current.timer = setTimeout(() => {
            R.current.isSubmiting = false;
            const sbs2 = R.current.sliderBaseSize;
            R.current.isCanSlide = false; R.current.mouseDown = false;
            R.current.startWidth = sbs2; R.current.startX = 0; R.current.newX = 0;
            setMouseDown(false); setStyleWidth(sbs2);
            setIsSuccess(false); setInfoShow(false); setInfoFail(false);
            init();
          }, 800);
        }
      };

      const handleMouseDown = (e) => {
        if (!R.current.isCanSlide) return; e.stopPropagation();
        const clientX = e.clientX ?? e.changedTouches?.[0]?.clientX;
        const { sliderBaseSize: sbs, canvasWidth: cw, startWidth: sw0, startX: sx0, newX: nx0 } = R.current;
        const curW = sw0 + nx0 - sx0, curSw = curW < sbs ? sbs : curW > cw ? cw : curW;
        R.current.mouseDown = true; R.current.startWidth = curSw;
        R.current.startX = clientX; R.current.newX = clientX;
        setMouseDown(true); setStyleWidth(curSw);
      };

      const handleMouseMove = (e) => {
        if (!R.current.mouseDown) return; e.preventDefault();
        const clientX = e.clientX ?? e.changedTouches?.[0]?.clientX;
        R.current.newX = clientX;
        const { startWidth: sw, startX: sx, sliderBaseSize: sbs, canvasWidth: cw } = R.current;
        const w = sw + clientX - sx, clamped = w < sbs ? sbs : w > cw ? cw : w;
        setStyleWidth(clamped);
      };

      const handleMouseUp = () => {
        if (!R.current.mouseDown) return;
        R.current.mouseDown = false; setMouseDown(false); submit();
      };

      useEffect(() => {
        document.addEventListener("mousemove", handleMouseMove, false);
        document.addEventListener("mouseup", handleMouseUp, false);
        document.addEventListener("touchmove", handleMouseMove, { passive: false });
        document.addEventListener("touchend", handleMouseUp, false);
        return () => {
          clearTimeout(R.current.timer);
          document.removeEventListener("mousemove", handleMouseMove, false);
          document.removeEventListener("mouseup", handleMouseUp, false);
          document.removeEventListener("touchmove", handleMouseMove, { passive: false });
          document.removeEventListener("touchend", handleMouseUp, false);
        };
      }, []);

      useEffect(() => {
        if (show) {
          document.body.style.overflow = "hidden";
          R.current.isSubmiting = false; clearTimeout(R.current.timer);
          resetState(); init();
        } else {
          document.body.style.overflow = "";
          clearTimeout(R.current.timer);
          R.current.isSubmiting = false; setIsSuccess(false); setInfoShow(false);
        }
        return () => { document.body.style.overflow = ""; };
      }, [show]);

      const flashX = isSuccess ? `${canvasWidth + canvasHeight * 0.578}px` : `-${canvasHeight * 0.578}px`;

      const PS = {
        overlay: {
          position: "fixed", top: 0, left: 0, bottom: 0, right: 0, backgroundColor: "rgba(0,0,0,0.35)",
          zIndex: 999, transition: "opacity 200ms", display: "flex", alignItems: "center", justifyContent: "center"
        },
        box: { padding: 20, background: "#fff", userSelect: "none", borderRadius: 6, boxShadow: "0 4px 24px rgba(0,0,0,0.2)" },
        body: { position: "relative", overflow: "hidden", borderRadius: 4 },
        c3: { position: "absolute", top: 0, left: 0, transition: "opacity 600ms", zIndex: 3 },
        c2: { position: "absolute", top: 0, left: 0, zIndex: 2 },
        loadBox: {
          position: "absolute", top: 0, left: 0, bottom: 0, right: 0, backgroundColor: "rgba(0,0,0,0.8)",
          zIndex: 20, transition: "opacity 200ms", display: "flex", alignItems: "center", justifyContent: "center"
        },
        info: {
          position: "absolute", bottom: 0, left: 0, width: "100%", height: 24, lineHeight: "24px",
          textAlign: "center", fontSize: 13, transition: "all 200ms", color: "#fff", zIndex: 10
        },
        flash: { position: "absolute", top: 0, left: 0, width: 30, height: "100%", backgroundColor: "rgba(255,255,255,0.1)", zIndex: 3 },
        resetBtn: {
          position: "absolute", top: 4, right: 4, width: 30, height: 30, zIndex: 12, cursor: "pointer",
          borderRadius: "50%", backgroundColor: "rgba(0,0,0,0.28)", padding: 5, boxSizing: "border-box",
          border: "none", display: "flex", alignItems: "center", justifyContent: "center"
        },
        rangeBox: {
          position: "relative", width: "100%", backgroundColor: "#eef1f8", borderRadius: 3,
          boxShadow: "0 0 8px rgba(230,230,230,0.8) inset", overflow: "hidden"
        },
        rangeText: {
          position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
          fontSize: 14, color: "#b7bcd1", whiteSpace: "nowrap", pointerEvents: "none"
        },
        rangeSlider: { position: "absolute", height: "100%", backgroundColor: "rgba(106,160,255,0.8)", borderRadius: 3 },
        rangeBtn: {
          position: "absolute", right: 0, display: "flex", alignItems: "center", justifyContent: "center",
          backgroundColor: "#fff", borderRadius: 3, boxShadow: "0 0 4px #ccc", cursor: "pointer"
        },
      };

      return (
        <div style={{ ...PS.overlay, opacity: show ? 1 : 0, pointerEvents: show ? "auto" : "none" }}
          onMouseDown={() => { R.current._closeDown = true; }}
          onMouseUp={() => { if (R.current._closeDown && !R.current.mouseDown && !R.current.isSubmiting) { clearTimeout(R.current.timer); R.current.onClose && R.current.onClose(); } R.current._closeDown = false; }}
          onTouchStart={() => { R.current._closeDown = true; }}
          onTouchEnd={() => { if (R.current._closeDown && !R.current.mouseDown && !R.current.isSubmiting) { clearTimeout(R.current.timer); R.current.onClose && R.current.onClose(); } R.current._closeDown = false; }}
        >
          <div style={PS.box} onMouseDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()}>
            <div style={{ ...PS.body, height: canvasHeight }}>
              <canvas ref={c1} width={canvasWidth} height={canvasHeight}
                style={{ width: canvasWidth, height: canvasHeight, display: "block" }} />
              <canvas ref={c3} width={canvasWidth} height={canvasHeight}
                style={{ ...PS.c3, width: canvasWidth, height: canvasHeight, opacity: isSuccess ? 1 : 0 }} />
              <canvas ref={c2} width={puzzleBaseSize} height={canvasHeight}
                style={{ ...PS.c2, width: puzzleBaseSize, height: canvasHeight, transform: `translateX(${puzzleOffset}px)` }} />
              <div style={{ ...PS.loadBox, opacity: loading ? 1 : 0, pointerEvents: loading ? "auto" : "none" }}>
                <LoadingDots />
              </div>
              <div style={{
                ...PS.info, opacity: infoShow ? .95 : 0,
                transform: infoShow ? "translateY(0)" : "translateY(24px)",
                backgroundColor: infoFail ? "#ce594b" : "#83ce3f"
              }}>{infoText}</div>
              <div style={{
                ...PS.flash, transform: `translateX(${flashX}) skew(-30deg,0)`,
                transition: isSuccess ? "transform 600ms" : "none"
              }} />
              <button className="pv-reset" style={PS.resetBtn} title="刷新"
                onClick={() => { if (!R.current.isSubmiting) reset(); }}>
                <ResetIcon />
              </button>
            </div>
            <div style={{ ...PS.rangeBox, height: sliderBaseSize, marginTop: 20 }}>
              <div style={PS.rangeText}>{sliderText}</div>
              <div style={{ ...PS.rangeSlider, width: styleWidth }}>
                <div className={`pv-range-btn${mouseDown ? " isDown" : ""}`}
                  style={{ ...PS.rangeBtn, width: sliderBaseSize, height: "100%" }}
                  onMouseDown={handleMouseDown} onTouchStart={handleMouseDown}>
                  <div /><div /><div />
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };


    /* ═══════════════════════════════════════════════════════════════
       模拟 API（替换为真实接口）
       成功: { code:"1", message:"success", data:"{}" }
       失败: { code:"0", message:"false",   data:"{}" }
    ═══════════════════════════════════════════════════════════════ */
    const mockApi = () => new Promise(resolve =>
      setTimeout(() => {
        resolve(Math.random() > 0.3
          ? { code: "1", message: "success", data: "{}" }
          : { code: "0", message: "false", data: "{}" }
        );
      }, 700)
    );

    const STATUS = { IDLE: "idle", VERIFY: "verify", LOADING: "loading", SUCCESS: "success", FAIL: "fail" };

    /* ═══════════════════════════════════════════════════════════════
       Demo App
    ═══════════════════════════════════════════════════════════════ */
    function App() {
      const [status, setStatus] = useState(STATUS.IDLE);
      const [apiResp, setApiResp] = useState(null);
      const [apiLog, setApiLog] = useState([]);   // 历史请求记录

      const showPuzzle = status === STATUS.VERIFY || status === STATUS.LOADING;

      const startVerify = () => {
        setStatus(STATUS.VERIFY);
        setApiResp(null);
      };

      const onPuzzleSuccess = async (deviation) => {
        setStatus(STATUS.LOADING);
        try {
          const res = await mockApi();
          setApiResp(res);
          setApiLog(prev => [{ time: new Date().toLocaleTimeString(), deviation: deviation.toFixed(1), res }, ...prev].slice(0, 5));
          setStatus(res.code === "1" ? STATUS.SUCCESS : STATUS.FAIL);
        } catch {
          const res = { code: "0", message: "网络异常", data: "{}" };
          setApiResp(res);
          setStatus(STATUS.FAIL);
        }
      };

      const onPuzzleFail = (deviation) => {
        // 拼图本身失败，组件内部自动重置，这里只做记录
      };

      const handleClose = () => {
        if (status === STATUS.LOADING) return;
        setStatus(STATUS.IDLE);
      };

      const reset = () => { setStatus(STATUS.IDLE); setApiResp(null); };

      // ── 样式 ──
      const isOk = status === STATUS.SUCCESS;
      const isFail = status === STATUS.FAIL;

      return (
        <div style={{
          minHeight: "100vh", background: "linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          padding: "24px 16px", gap: 20
        }}>

          <a href="https://github.com/moshang-cx/SlideVerify" target="_blank" className="github-corner" aria-label="View source on GitHub">
            <svg width="80" height="80" viewBox="0 0 250 250" style={{ fill: "#667eea", color: "#fff", position: "absolute", top: 0, border: 0, right: 0 }} aria-hidden="true">
              <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
              <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style={{ transformOrigin: "130px 106px" }} className="octo-arm"></path>
              <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" className="octo-body"></path>
            </svg>
          </a>

          <PuzzleVcode
            show={showPuzzle}
            onClose={handleClose}
            onSuccess={onPuzzleSuccess}
            onFail={onPuzzleFail}
            imgs={[
              'https://picsum.photos/id/1018/500/300',
              'https://picsum.photos/id/1015/500/300',
              'https://picsum.photos/id/1019/500/300'
            ]}
          />

          {/* ── 主卡片 ── */}
          <div className="demo-card" style={{
            background: "#fff", borderRadius: 18, padding: "36px 40px",
            width: "100%", maxWidth: 440, boxShadow: "0 32px 80px rgba(0,0,0,0.4)",
            animation: "fadeUp 400ms ease"
          }}>

            {/* 头部 */}
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 48, marginBottom: 10, lineHeight: 1 }}>🔐</div>
              <h1 style={{ fontSize: 22, fontWeight: 800, color: "#1a202c", margin: "0 0 6px" }}>
                拼图验证码 Demo
              </h1>
              <p style={{ fontSize: 13, color: "#a0aec0", margin: 0 }}>
                PuzzleVcode · React · 无外部依赖
              </p>
            </div>

            {/* 状态区 */}
            <div style={{
              minHeight: 80, display: "flex", alignItems: "center", justifyContent: "center",
              marginBottom: 20, borderRadius: 12, background: "#f7f8fa", padding: "16px 20px"
            }}>

              {status === STATUS.IDLE && (
                <div style={{ textAlign: "center", color: "#a0aec0", animation: "fadeIn 300ms" }}>
                  <div style={{ fontSize: 32, marginBottom: 6 }}>🧩</div>
                  <div style={{ fontSize: 13 }}>点击下方按钮，完成拼图后自动调用接口</div>
                </div>
              )}

              {status === STATUS.LOADING && (
                <div style={{ display: "flex", alignItems: "center", gap: 12, animation: "fadeIn 200ms" }}>
                  <div style={{
                    width: 24, height: 24, border: "3px solid #e9e9ff", borderTopColor: "#667eea",
                    borderRadius: "50%", animation: "spin 0.7s linear infinite", flexShrink: 0
                  }} />
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#667eea" }}>正在请求验证接口…</div>
                    <div style={{ fontSize: 12, color: "#a0aec0", marginTop: 2 }}>POST /api/verify</div>
                  </div>
                </div>
              )}

              {(isOk || isFail) && apiResp && (
                <div style={{ width: "100%", animation: "fadeIn 300ms" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                    <span style={{ fontSize: 28 }}>{isOk ? "✅" : "❌"}</span>
                    <div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: isOk ? "#38a169" : "#e53e3e" }}>
                        {isOk ? "验证通过" : "验证失败"}
                      </div>
                      <div style={{ fontSize: 12, color: "#718096", marginTop: 1 }}>
                        message: {apiResp.message}
                      </div>
                    </div>
                  </div>
                  {/* JSON 响应 */}
                  <pre style={{
                    margin: 0, padding: "10px 12px", background: "#1a202c", borderRadius: 8,
                    fontSize: 12, color: "#e2e8f0", lineHeight: 1.8, overflowX: "auto",
                    borderLeft: `3px solid ${isOk ? "#68d391" : "#fc8181"}`
                  }}>
                    {JSON.stringify(apiResp, null, 2)}
                  </pre>
                </div>
              )}
            </div>

            {/* 操作按钮 */}
            <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
              {(status === STATUS.IDLE || isOk || isFail) && (
                <button onClick={status === STATUS.IDLE ? startVerify : reset}
                  style={{
                    flex: 1, padding: "13px 0", border: "none", borderRadius: 10, cursor: "pointer",
                    fontSize: 15, fontWeight: 700, letterSpacing: 0.5, transition: "opacity 150ms",
                    background: isOk
                      ? "linear-gradient(135deg,#56d07e,#38a169)"
                      : isFail
                        ? "linear-gradient(135deg,#fc8181,#e53e3e)"
                        : "linear-gradient(135deg,#667eea,#764ba2)",
                    color: "#fff"
                  }}>
                  {status === STATUS.IDLE ? "🚀 开始验证" : isOk ? "🔄 再次验证" : "🔁 重试"}
                </button>
              )}
              {isOk && (
                <button onClick={() => window.open("https://github.com/moshang-cx/SlideVerify", "_blank")}
                  style={{
                    flex: 1, padding: "13px 0", border: "2px solid #667eea", borderRadius: 10,
                    cursor: "pointer", fontSize: 15, fontWeight: 700, background: "#fff", color: "#667eea"
                  }}>
                  View on GitHub →
                </button>
              )}
              {status === STATUS.LOADING && (
                <button disabled style={{
                  flex: 1, padding: "13px 0", border: "none", borderRadius: 10,
                  fontSize: 15, fontWeight: 700, background: "#e2e8f0", color: "#a0aec0", cursor: "not-allowed"
                }}>
                  验证中…
                </button>
              )}
            </div>

            {/* 接口约定说明 */}
            <div style={{ background: "#f7f8fa", borderRadius: 10, padding: "14px 16px" }}>
              <div style={{
                fontSize: 11, fontWeight: 700, color: "#a0aec0",
                textTransform: "uppercase", letterSpacing: 1, marginBottom: 10
              }}>接口约定</div>
              {[
                {
                  label: "通过", bg: "#f6ffed", color: "#389e0d", border: "#b7eb8f",
                  json: `{ "code": "1", "message": "success", "data": "{}" }`
                },
                {
                  label: "失败", bg: "#fff2f0", color: "#cf1322", border: "#ffa39e",
                  json: `{ "code": "0", "message": "false", "data": "{}" }`
                },
              ].map(({ label, bg, color, border, json }) => (
                <div key={label} style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 6 }}>
                  <span style={{
                    fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 4,
                    background: bg, color, border: `1px solid ${border}`, flexShrink: 0
                  }}>{label}</span>
                  <code style={{
                    fontSize: 11, color: "#718096", wordBreak: "break-all",
                    fontFamily: "'SFMono-Regular',Consolas,monospace"
                  }}>{json}</code>
                </div>
              ))}
            </div>
          </div>

          {/* ── 请求日志 ── */}
          {apiLog.length > 0 && (
            <div style={{ width: "100%", maxWidth: 440, animation: "fadeUp 400ms ease" }}>
              <div style={{
                fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.4)",
                letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, paddingLeft: 4
              }}>
                请求历史
              </div>
              {apiLog.map((entry, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  background: "rgba(255,255,255,0.06)", borderRadius: 8, padding: "8px 12px",
                  marginBottom: 6, fontSize: 12, backdropFilter: "blur(4px)"
                }}>
                  <span style={{ color: entry.res.code === "1" ? "#68d391" : "#fc8181", fontSize: 16 }}>
                    {entry.res.code === "1" ? "✓" : "✗"}
                  </span>
                  <span style={{ color: "rgba(255,255,255,0.7)", flex: 1 }}>
                    code: <strong style={{ color: "#fff" }}>{entry.res.code}</strong>
                    &nbsp;·&nbsp;
                    message: <strong style={{ color: "#fff" }}>{entry.res.message}</strong>
                  </span>
                  <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 11 }}>
                    偏差 {entry.deviation}px &nbsp; {entry.time}
                  </span>
                </div>
              ))}
            </div>
          )}

          {/* ── Footer ── */}
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", textAlign: "center", marginTop: 4 }}>
            移植自&nbsp;
            <a href="https://github.com/javaLuo/vue-puzzle-vcode" target="_blank"
              style={{ color: "rgba(255,255,255,0.5)", textDecoration: "none" }}>
              vue-puzzle-vcode
            </a>
            &nbsp;·&nbsp;React 版本 · 无外部依赖
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
